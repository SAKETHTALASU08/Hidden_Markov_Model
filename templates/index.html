<!DOCTYPE html>
<html>
<head>
    <title>HMM NLP</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #43cea2, #185a9d);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 60px;
        }

        input {
            padding: 10px;
            width: 320px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #222;
        }

        .sequence {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .box {
            text-align: center;
        }

        .word {
            font-size: 18px;
            font-weight: bold;
        }

        .arrow {
            font-size: 20px;
            margin: 5px 0;
        }

        .tag {
            background: white;
            color: black;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .prob-box {
            margin-top: 30px;
            font-size: 18px;
            background: white;
            color: black;
            display: inline-block;
            padding: 12px 20px;
            border-radius: 8px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hidden Markov Model</h1>

    <form method="POST">
        <input type="text" name="sentence" placeholder="Enter sentence (e.g. I love NLP)" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if best_pairs %}

        <h3>Best Sequence</h3>

        <div class="sequence">
            {% for word, tag in best_pairs %}
                <div class="box">
                    <div class="word">{{ word }}</div>
                    <div class="arrow">↓</div>
                    <div class="tag">{{ tag }}</div>
                </div>
            {% endfor %}
        </div>

        <div class="prob-box">
            <b>Probability Comparison:</b><br><br>

            {% for item in comparisons %}
                Path {{ item.path }} → {{ item.prob }}
                {% if item.best %} ✅ BEST {% endif %}
                <br>
            {% endfor %}
        </div>

    {% endif %}

</div>

</body>
</html>
